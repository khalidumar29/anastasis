# Anastasis — routes anastasis.app + *.anastasis.app into the k3s cluster's
# ingress-nginx controller (fixed NodePort 30080), which does the actual
# per-app host-based routing. Plain HTTP only: Cloudflare Flexible SSL
# terminates public HTTPS at Cloudflare's edge and reaches this origin over
# HTTP. Does not touch any other existing site's config.
#
# Deployed on the real VPS at /etc/nginx/sites-available/anastasis.conf,
# symlinked into sites-enabled/. This file is the checked-in copy of record.
server {
    listen 80;
    listen [::]:80;
    server_name anastasis.app *.anastasis.app;

    # Screen recording uploads are tens of MB — nginx's global default
    # (1m) rejected them with 413 until this was set (caught by an actual
    # live end-to-end upload test, not by reading the code).
    client_max_body_size 200m;

    location / {
        proxy_pass http://127.0.0.1:30080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
